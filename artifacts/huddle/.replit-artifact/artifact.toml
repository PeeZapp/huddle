kind = "web"
previewPath = "/"
title = "Huddle"
version = "1.0.0"
id = "artifacts/huddle"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20881

[services.development]
run = "pnpm --filter @workspace/huddle run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/huddle", "run", "build" ]
publicDir = "artifacts/huddle/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20881"
BASE_PATH = "/"
