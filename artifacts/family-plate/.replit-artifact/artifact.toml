kind = "mobile"
previewPath = "/"
title = "FamilyPlate"
version = "1.0.0"
id = "artifacts/family-plate"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 22620
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/family-plate run dev"

[services.env]
PORT = "22620"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/family-plate", "run", "build"]
run = ["pnpm", "--filter", "@workspace/family-plate", "run", "serve"]
